<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roll Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;500;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; font-family: 'Martian Mono', monospace; }
        .overlay-container {
            width: 1600px; height: 210px;
            background: #101014; border-radius: 18px;
            position: absolute; top: -500px; left: 50%;
            transform: translateX(-50%);
            display: grid; grid-template-columns: 280px 1fr 280px; align-items: center;
            padding: 0 80px; box-shadow: 0 14px 45px rgba(0,0,0,0.45);
            transition: top 0.65s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .overlay-container.active { top: 0; }
        .mock-user { display: flex; align-items: center; gap: 24px; }
        .mock-avatar { width: 80px; height: 80px; border-radius: 8px; background: #333; overflow: hidden; }
        .mock-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .mock-nick { font-size: 32px; font-weight: 900; color: #fff; text-transform: uppercase; }
        .mock-center { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 40px; text-align: center; }
        .mock-col-title { font-size: 14px; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.1em; color: #a855f7; }
        .mock-col-val { font-size: 108px; font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 10px 28px rgba(0,0,0,0.75); }
        .mock-vs { font-size: 48px; font-weight: 900; color: rgba(255,255,255,0.1); }
        .mock-reward { display: flex; align-items: center; justify-content: flex-end; gap: 24px; }
        .mock-reward-title { font-size: 18px; font-weight: 700; color: #fff; text-align: right; text-transform: uppercase; }
        .mock-reward-img { width: 80px; height: 80px; border-radius: 8px; background: #7c3aed; display: flex; align-items: center; justify-content: center; font-size: 32px; }
        .win-badge { position: absolute; bottom: -40px; right: 80px; background: #22c55e; color: #fff; padding: 10px 30px; font-size: 24px; font-weight: 900; border-radius: 4px; transform: scale(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .win-badge.active { transform: scale(1); }
    </style>
</head>
<body>
    <div class="overlay-container" id="panel">
        <div class="mock-user">
            <div class="mock-avatar" id="avatar"><img src="" id="avatar-img"></div>
            <div class="mock-nick" id="user-name">Viewer</div>
        </div>
        <div class="mock-center">
            <div class="mock-col">
                <div class="mock-col-title">ЧИСЛО ЗРИТЕЛЯ</div>
                <div class="mock-col-val" id="user-choice">00</div>
            </div>
            <div class="mock-vs">VS</div>
            <div class="mock-col">
                <div class="mock-col-title">ЧИСЛО РАНДОМА</div>
                <div class="mock-col-val" id="random-val">00</div>
            </div>
        </div>
        <div class="mock-reward">
            <div class="mock-reward-title" id="reward-name">НАГРАДА</div>
            <div class="mock-reward-img" id="reward-icon">🎁</div>
        </div>
        <div class="win-badge" id="win-badge">WIN!</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');
        let isRunning = false;
        let settings = {};

        async function loadSettings() {
            try {
                const res = await fetch(`/api/overlays/settings?userId=${userId}`);
                settings = await res.json();
                if (settings.color_bg) document.getElementById('panel').style.background = settings.color_bg;
                if (settings.color_name) document.getElementById('user-name').style.color = settings.color_name;
                if (settings.color_num) {
                    document.getElementById('user-choice').style.color = settings.color_num;
                    document.getElementById('random-val').style.color = settings.color_num;
                }
                if (settings.reward_name) document.getElementById('reward-name').textContent = settings.reward_name;
            } catch (e) {}
        }

        async function checkTrigger() {
            if (isRunning) return;
            try {
                const res = await fetch(`/api/overlays/trigger?userId=${userId}`);
                const data = await res.json();
                if (data && data.triggerId) {
                    runGame(data);
                }
            } catch (e) {}
        }

        function runGame(data) {
            isRunning = true;
            document.getElementById('user-name').textContent = data.userName;
            document.getElementById('user-choice').textContent = data.userChoice.toString().padStart(2, '0');
            
            const panel = document.getElementById('panel');
            const randomEl = document.getElementById('random-val');
            const badge = document.getElementById('win-badge');
            
            panel.classList.add('active');
            
            setTimeout(() => {
                let count = 0;
                const rollInt = setInterval(() => {
                    randomEl.textContent = Math.floor(Math.random() * (settings.max_val || 100 - (settings.min_val || 1)) + (settings.min_val || 1)).toString().padStart(2, '0');
                    count++;
                    if (count > 40) {
                        clearInterval(rollInt);
                        const final = data.userChoice; // Force win or random? Original logic is random.
                        // For demo let's do real random:
                        const finalRandom = Math.floor(Math.random() * (settings.max_val || 100 - (settings.min_val || 1)) + (settings.min_val || 1));
                        randomEl.textContent = finalRandom.toString().padStart(2, '0');
                        
                        if (finalRandom === data.userChoice) {
                            badge.classList.add('active');
                        }
                        
                        setTimeout(() => {
                            badge.classList.remove('active');
                            panel.classList.remove('active');
                            setTimeout(() => { isRunning = false; }, 1000);
                        }, 5000);
                    }
                }, 80);
            }, 1000);
        }

        if (userId) {
            loadSettings();
            setInterval(checkTrigger, 3000);
        }
    </script>
</body>
</html>
