<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fate Roll Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Martian+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1620px;
            height: 290px;
            overflow: hidden;
            background: transparent;
            font-family: 'Inter', sans-serif;
            color: white; /* Default White */
        }

        #panel {
            position: absolute;
            top: 20px;
            left: 10px;
            width: 1600px;
            height: 250px;
            background: #101014;
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
            opacity: 0;
            transform: translateY(-300px);
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        #panel.active { transform: translateY(0); opacity: 1; }
        #panel.exit { transform: translateY(300px); opacity: 0; }

        #bg-nick {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 280px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03); 
            text-transform: uppercase;
            white-space: nowrap;
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .user-block {
            display: flex;
            align-items: center;
            gap: 30px;
            min-width: 450px;
        }

        #avatar {
            width: 110px;
            height: 110px;
            border-radius: 12px;
            background: #222;
            object-fit: cover;
        }

        #user-nick {
            font-size: 54px; /* Enlarged */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            color: #ffffff; /* Forced White */
        }

        .score-block {
            display: flex;
            align-items: center;
            gap: 50px;
            text-align: center;
        }

        .col { display: flex; flex-direction: column; align-items: center; }
        .label {
            font-size: 14px;
            font-weight: 800;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-bottom: -5px;
            background: rgba(0,0,0,0.4);
            padding: 4px 14px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .val {
            font-size: 150px; /* Bigger numbers */
            font-weight: 900;
            font-family: 'Martian Mono', monospace;
            color: #ffffff; /* Forced White */
            text-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .vs {
            font-size: 50px;
            font-weight: 900;
            color: rgba(255,255,255,0.1);
        }

        .reward-block {
            display: flex;
            align-items: center;
            gap: 30px;
            min-width: 450px;
            justify-content: flex-end;
        }

        #reward-info {
            text-align: right;
            line-height: 1.1;
        }

        #reward-name {
            font-size: 54px; /* Same as Nickname size */
            font-weight: 900;
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: -2px;
        }

        #reward-icon {
            width: 150px; /* Much bigger icon */
            height: 150px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #reward-icon img { width: 100%; height: 100%; object-fit: contain; }

        #win-badge {
            position: absolute;
            bottom: -35px;
            right: 120px;
            background: #22c55e;
            padding: 12px 40px;
            font-size: 38px;
            font-weight: 900;
            border-radius: 8px;
            transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 40px rgba(34,197,94,0.5);
            color: white;
        }
        #win-badge.active { transform: scale(1); }

    </style>
</head>
<body>
    <div id="panel">
        <div id="bg-nick">USER</div>
        
        <div class="content">
            <div class="user-block">
                <img src="" id="avatar">
                <div id="user-nick">PLAYER</div>
            </div>

            <div class="score-block">
                <div class="col">
                    <span class="label">Число зрителя</span>
                    <span class="val" id="val-user">00</span>
                </div>
                <div class="vs">VS</div>
                <div class="col">
                    <span class="label">Число рандома</span>
                    <span class="val" id="val-random">00</span>
                </div>
            </div>

            <div class="reward-block">
                <div id="reward-info">
                    <div id="reward-name">REWARD</div>
                </div>
                <div id="reward-icon">🎁</div>
            </div>
        </div>

        <div id="win-badge">ПОБЕДА!</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');
        let isRunning = false;
        let lastTriggerId = null;
        let assets = {};

        async function loadAssets() {
            if (!userId) return;
            try {
                const res = await fetch(`/api/ov_upload?userId=${userId}`);
                assets = await res.json();
                if (assets.panel_bg) document.getElementById('panel').style.backgroundImage = `url(${assets.panel_bg})`;
                if (assets.reward_img) document.getElementById('reward-icon').innerHTML = `<img src="${assets.reward_img}">`;
            } catch (e) {}
        }

        async function loadSettings() {
            if (!userId) return;
            try {
                const res = await fetch(`/api/ov_settings?userId=${userId}`);
                const settings = await res.json();
                // We keep static white values but can overwrite if user really wants later
                if (settings.reward_name) document.getElementById('reward-name').textContent = settings.reward_name;
            } catch (e) {}
        }

        async function checkTrigger() {
            if (isRunning || !userId) return;
            try {
                const res = await fetch(`/api/ov_trigger?userId=${userId}`);
                const data = await res.json();
                if (data && data.triggerId && data.triggerId !== lastTriggerId) {
                    lastTriggerId = data.triggerId;
                    runGame(data);
                }
            } catch (e) {}
        }

        function runGame(data) {
            isRunning = true;
            const p = document.getElementById('panel');
            const vUser = document.getElementById('val-user');
            const vRand = document.getElementById('val-random');
            const bWin = document.getElementById('win-badge');
            const nick = document.getElementById('user-nick');
            const bgNick = document.getElementById('bg-nick');

            // Set Data
            nick.textContent = data.userName;
            bgNick.textContent = data.userName;
            if (data.userAvatar) document.getElementById('avatar').src = data.userAvatar;
            vUser.textContent = data.userChoice.toString().padStart(2, '0');
            vRand.textContent = "00";
            vRand.style.color = "white";
            bWin.classList.remove('active');
            p.classList.remove('exit');
            
            // Sequence Start
            setTimeout(() => {
                p.classList.add('active'); // IN Animation (0.6s)
                
                // WAIT (1.0s)
                setTimeout(() => {
                    // ROLL Animation (~3s)
                    let count = 0;
                    const roll = setInterval(() => {
                        const r = Math.floor(Math.random() * 99 + 1);
                        vRand.textContent = r.toString().padStart(2, '0');
                        count++;
                        if (count > 38) {
                            clearInterval(roll);
                            
                            // Result logic
                            // If test, we can force a win sometimes
                            let resultNum = data.isTest ? (Math.random() > 0.5 ? data.userChoice : Math.floor(Math.random() * 99 + 1)) : Math.floor(Math.random() * 99 + 1);
                            
                            vRand.textContent = resultNum.toString().padStart(2, '0');

                            if (parseInt(vRand.textContent) === parseInt(vUser.textContent)) {
                                vRand.style.color = "#22c55e"; // Green for win
                                bWin.classList.add('active'); // WIN (shows for 5s)
                            } else {
                                vRand.style.color = "#ef4444"; // Red for lose
                            }

                            // STAY (5.0s)
                            setTimeout(() => {
                                p.classList.add('exit'); // OUT Animation (0.6s)
                                p.classList.remove('active');
                                setTimeout(() => { isRunning = false; }, 1000);
                            }, 5000);
                        }
                    }, 80);
                }, 1000);
            }, 100);
        }

        if (userId) {
            loadAssets();
            loadSettings();
            setInterval(checkTrigger, 3000);
        }
    </script>
</body>
</html>
