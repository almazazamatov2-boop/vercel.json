<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лото - Админ панель</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            color: #FFD700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: rgba(255, 215, 0, 0.7);
            font-size: 18px;
            letter-spacing: 2px;
        }

        .panel {
            background: linear-gradient(145deg, #2a2a3e 0%, #1f1f2e 100%);
            border: 3px solid #FFD700;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .section-title {
            color: #FFD700;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Ввод числа */
        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            align-items: center;
        }

        .number-input {
            flex: 1;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            border: 3px solid #FFD700;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            color: #FFD700;
            outline: none;
            transition: all 0.3s ease;
        }

        .number-input:focus {
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-add {
            background: linear-gradient(145deg, #FFD700 0%, #DAA520 100%);
            color: #000;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: linear-gradient(145deg, #ff6b6b 0%, #ee5a6f 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        /* Сетка всех чисел 1-90 */
        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .grid-number {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #3a3a4e 0%, #2a2a3e 100%);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .grid-number:hover {
            transform: scale(1.1);
            border-color: #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .grid-number.drawn {
            background: linear-gradient(145deg, #FFD700 0%, #DAA520 100%);
            color: #000;
            border-color: #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* Список выпавших чисел */
        .drawn-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 60px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
        }

        .drawn-barrel {
            width: 45px;
            height: 45px;
            background: linear-gradient(145deg, #FFD700 0%, #DAA520 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #000;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            position: relative;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .drawn-barrel:hover {
            transform: scale(1.1);
        }

        .drawn-barrel .remove {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 18px;
            height: 18px;
            background: #ff6b6b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .drawn-barrel:hover .remove {
            opacity: 1;
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Статистика */
        .stats {
            display: flex;
            justify-content: space-around;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            color: rgba(255, 215, 0, 0.7);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #FFD700;
            font-size: 32px;
            font-weight: 800;
        }

        /* Последнее выпавшее число */
        .last-number {
            text-align: center;
            margin-bottom: 20px;
        }

        .last-number-label {
            color: rgba(255, 215, 0, 0.7);
            font-size: 16px;
            margin-bottom: 10px;
        }

        .last-number-value {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #FFD700 0%, #DAA520 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            font-size: 48px;
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6);
            margin: 0 auto;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        .empty-last {
            background: rgba(255, 215, 0, 0.1);
            border: 3px dashed rgba(255, 215, 0, 0.3);
            color: rgba(255, 215, 0, 0.3);
            font-size: 24px;
        }


        .lobby-admin-row {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            background: rgba(255,215,0,.08); border: 1px solid rgba(255,215,0,.2);
            border-radius: 12px; padding: 14px 16px;
        }
        .lobby-admin-info { flex: 1; }
        .lobby-admin-name { font-weight: 800; color: #FFD700; margin-bottom: 4px; }
        .lobby-admin-meta { font-size: 12px; color: rgba(255,215,0,.6); }
        .player-progress-row {
            display: flex; align-items: center; gap: 12px;
            background: rgba(0,0,0,.3); border-radius: 10px; padding: 12px 14px;
        }
        .player-progress-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(145deg,#FFD700,#DAA520);
            display:flex;align-items:center;justify-content:center;
            font-weight:800;color:#000;font-size:16px;flex-shrink:0;
        }
        .player-progress-info { flex:1; }
        .player-progress-name { font-weight:700;color:#fff;margin-bottom:4px; }
        .player-progress-bar-wrap { height:8px;background:rgba(255,215,0,.15);border-radius:4px;overflow:hidden; }
        .player-progress-bar { height:100%;background:linear-gradient(90deg,#FFD700,#DAA520);border-radius:4px;transition:width .4s ease; }
        .player-progress-count { font-size:13px;color:#FFD700;font-weight:800;min-width:40px;text-align:right; }

        @media (max-width: 768px) {
            .numbers-grid {
                grid-template-columns: repeat(9, 1fr);
                gap: 5px;
            }

            .grid-number {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">LOTO ADMIN</div>
            <div class="subtitle">Панель ведущего</div>
        </div>

        <div class="panel">
            <div class="section-title">Последний бочонок</div>
            <div class="last-number">
                <div id="lastNumber" class="last-number-value empty-last">—</div>
            </div>

            <div class="section-title">Ввести номер бочонка</div>
            <div class="input-section">
                <input 
                    type="number" 
                    id="numberInput" 
                    class="number-input" 
                    min="1" 
                    max="90" 
                    placeholder="1-90"
                    autofocus
                >
                <button class="btn btn-add" onclick="addNumber()">Добавить</button>
                <button class="btn btn-clear" onclick="clearAll()">Очистить всё</button>
            </div>
        </div>

        <div class="panel">
            <div class="section-title">Выпавшие бочонки</div>
            <div class="drawn-list" id="drawnList"></div>
        </div>

        <div class="panel">
            <div class="section-title">Все числа (1-90)</div>
            <div class="numbers-grid" id="numbersGrid"></div>
        </div>

        <div class="panel">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-label">Выпало</div>
                    <div class="stat-value" id="drawnCount">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Осталось</div>
                    <div class="stat-value" id="remainingCount">90</div>
                </div>
            </div>
        </div>

        <div class="panel" id="lobbiesPanel">
            <div class="section-title">Активные лобби</div>
            <div id="lobbiesList" style="display:flex;flex-direction:column;gap:10px;min-height:40px;">
                <div style="color:rgba(255,215,0,.5);text-align:center;font-size:14px;">Нажми "Обновить"</div>
            </div>
            <button class="btn" style="background:linear-gradient(145deg,#4a9eff,#2980b9);color:#fff;margin-top:15px;width:100%;" onclick="loadLobbies()">🔄 Обновить лобби</button>
        </div>

        <div class="panel" id="playersPanel" style="display:none;">
            <div class="section-title" id="playersPanelTitle">Игроки</div>
            <div id="playersList" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>

    </div>

    <script>
        let drawnNumbers = new Set();  // для быстрой проверки наличия
        let drawnOrder = [];           // порядок выпадения

        // Инициализация сетки чисел
        function initGrid() {
            const grid = document.getElementById('numbersGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 90; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-number';
                cell.textContent = i;
                cell.dataset.number = i;
                cell.addEventListener('click', () => toggleNumber(i));
                grid.appendChild(cell);
            }
        }

        function toggleNumber(num) {
            if (drawnNumbers.has(num)) removeNumber(num);
            else addNumberToDrawn(num);
        }

        async function addNumber() {
            const input = document.getElementById('numberInput');
            const num = parseInt(input.value);
            if (!num || num < 1 || num > 90) { alert('Введите число от 1 до 90'); return; }
            if (drawnNumbers.has(num)) { alert('Это число уже выпало!'); return; }
            await addNumberToDrawn(num);
            input.value = '';
            input.focus();
        }

        async function addNumberToDrawn(num) {
            try {
                const res = await fetch('/api/drawn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: num })
                });
                const data = await res.json();
                if (data.drawn) {
                    drawnOrder = data.drawn; // сервер хранит порядок
                    drawnNumbers = new Set(data.drawn);
                    updateDisplay();
                    showLastNumber(num);
                }
            } catch(e) {
                await loadFromServer();
            }
        }

        async function removeNumber(num) {
            if (!confirm(`Удалить бочонок ${num}?`)) return;
            try {
                const res = await fetch(`/api/drawn/${num}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.drawn) {
                    drawnOrder = data.drawn;
                    drawnNumbers = new Set(data.drawn);
                    updateDisplay();
                }
            } catch(e) { await loadFromServer(); }
        }

        function showLastNumber(num) {
            const el = document.getElementById('lastNumber');
            el.textContent = num;
            el.classList.remove('empty-last');
            el.style.animation = 'none';
            setTimeout(() => { el.style.animation = 'bounce 1s ease-in-out'; }, 10);
        }

        function updateDisplay() {
            document.querySelectorAll('.grid-number').forEach(cell => {
                const num = parseInt(cell.dataset.number);
                cell.classList.toggle('drawn', drawnNumbers.has(num));
            });

            const drawnList = document.getElementById('drawnList');
            drawnList.innerHTML = '';
            // Показываем в порядке выпадения (не по возрастанию)
            drawnOrder.forEach(num => {
                const barrel = document.createElement('div');
                barrel.className = 'drawn-barrel';
                barrel.textContent = num;
                const removeBtn = document.createElement('div');
                removeBtn.className = 'remove';
                removeBtn.textContent = '×';
                removeBtn.onclick = (e) => { e.stopPropagation(); removeNumber(num); };
                barrel.appendChild(removeBtn);
                drawnList.appendChild(barrel);
            });

            document.getElementById('drawnCount').textContent = drawnOrder.length;
            document.getElementById('remainingCount').textContent = 90 - drawnOrder.length;

            if (drawnOrder.length > 0) showLastNumber(drawnOrder[drawnOrder.length - 1]);
            else {
                const el = document.getElementById('lastNumber');
                el.textContent = '—';
                el.classList.add('empty-last');
            }
        }

        async function clearAll() {
            if (!confirm('Удалить все выпавшие бочонки?')) return;
            try {
                await fetch('/api/drawn/all', { method: 'DELETE' });
                drawnOrder = [];
                drawnNumbers.clear();
                updateDisplay();
            } catch(e) { await loadFromServer(); }
        }

        async function loadFromServer() {
            try {
                const res = await fetch('/api/drawn', { cache: 'no-store' });
                const data = await res.json();
                drawnOrder = data.drawn || [];
                drawnNumbers = new Set(drawnOrder);
                updateDisplay();
            } catch(e) {
                document.getElementById('drawnList').innerHTML =
                    '<div style="color:rgba(255,100,100,.8);font-size:14px;">⚠️ Сервер недоступен</div>';
            }
        }

        // Enter в поле ввода
        document.getElementById('numberInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addNumber();
        });

        // Инициализация
        window.addEventListener('DOMContentLoaded', () => {
            initGrid();
            loadFromServer();
        });

        // ====== УПРАВЛЕНИЕ ЛОББИ ======
        let activeLobbyId = null;

        async function loadLobbies() {
            const box = document.getElementById('lobbiesList');
            box.innerHTML = '<div style="color:rgba(255,215,0,.5);text-align:center;font-size:14px;">Загрузка...</div>';
            try {
                const res = await fetch('/api/lobbies?all=1', { cache: 'no-store' });
                const lobbies = await res.json();
                if (!lobbies.length) {
                    box.innerHTML = '<div style="color:rgba(255,215,0,.5);text-align:center;font-size:14px;">Нет активных лобби</div>';
                    return;
                }
                box.innerHTML = '';
                lobbies.forEach(l => {
                    const row = document.createElement('div');
                    row.className = 'lobby-admin-row';
                    row.innerHTML = `
                        <div class="lobby-admin-info">
                            <div class="lobby-admin-name">${l.name || 'Лобби'}</div>
                            <div class="lobby-admin-meta">Код: ${l.code} • Игроков: ${l.players_count}/${l.max_players} • ${l.status === 'playing' ? '🟢 Игра идёт' : '🟡 Ожидание'}</div>
                        </div>
                        <div style="display:flex;gap:8px;flex-shrink:0;">
                            <button class="btn" style="background:rgba(74,158,255,.2);color:#4a9eff;border:1px solid #4a9eff;padding:8px 12px;font-size:13px;" onclick="loadPlayers('${l.id}', '${l.name || 'Лобби'}')">👥 Игроки</button>
                            <button class="btn btn-clear" style="padding:8px 12px;font-size:13px;" onclick="closeLobby('${l.id}')">✕ Закрыть</button>
                        </div>
                    `;
                    box.appendChild(row);
                });
            } catch(e) {
                box.innerHTML = '<div style="color:#ff6b6b;font-size:14px;">Ошибка загрузки</div>';
            }
        }

        async function closeLobby(id) {
            if (!confirm('Закрыть это лобби? Все игроки будут отключены.')) return;
            try {
                await fetch(`/api/lobbies/${id}`, { method: 'DELETE' });
                loadLobbies();
                if (activeLobbyId === id) {
                    document.getElementById('playersPanel').style.display = 'none';
                    activeLobbyId = null;
                }
            } catch(e) { alert('Ошибка'); }
        }

        async function loadPlayers(lobbyId, lobbyName) {
            activeLobbyId = lobbyId;
            const panel = document.getElementById('playersPanel');
            const list = document.getElementById('playersList');
            document.getElementById('playersPanelTitle').textContent = `👥 ${lobbyName}`;
            panel.style.display = 'block';
            list.innerHTML = '<div style="color:rgba(255,215,0,.5);font-size:14px;text-align:center;">Загрузка...</div>';
            try {
                const res = await fetch(`/api/lobbies/${lobbyId}/players`, { cache: 'no-store' });
                const players = await res.json();
                renderPlayers(players);
            } catch(e) {
                list.innerHTML = '<div style="color:#ff6b6b;font-size:14px;">Ошибка загрузки</div>';
            }
        }

        function renderPlayers(players) {
            const list = document.getElementById('playersList');
            list.innerHTML = '';
            if (!players.length) {
                list.innerHTML = '<div style="color:rgba(255,215,0,.5);font-size:14px;text-align:center;">Нет игроков</div>';
                return;
            }
            players.forEach(p => {
                const marked = (p.marked_cells ? JSON.parse(p.marked_cells) : []).length;
                const total = 15;
                const pct = Math.round(marked / total * 100);
                const row = document.createElement('div');
                row.className = 'player-progress-row';
                row.innerHTML = `
                    <div class="player-progress-avatar">${(p.nickname || 'И').charAt(0).toUpperCase()}</div>
                    <div class="player-progress-info">
                        <div class="player-progress-name">${p.nickname || 'Игрок'} ${p.is_admin ? '👑' : ''}</div>
                        <div class="player-progress-bar-wrap">
                            <div class="player-progress-bar" style="width:${pct}%"></div>
                        </div>
                    </div>
                    <div class="player-progress-count">${marked}/15</div>
                `;
                list.appendChild(row);
            });
        }

        // Автообновление игроков каждые 3 секунды
        setInterval(() => {
            if (activeLobbyId) loadPlayers(activeLobbyId, document.getElementById('playersPanelTitle').textContent.replace('👥 ', ''));
        }, 3000);

    </script>
</body>
</html>
